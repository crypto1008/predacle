name: Fetch Markets Every 30 Minutes
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch all prediction markets
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/fetch-markets")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          echo "Response: $body"
          echo "HTTP Status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "Cron failed with status $http_code"
            exit 1
          fi
      - name: Refresh LP opportunities
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/lp-refresh")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          echo "LP Response: $body"
          echo "HTTP Status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "LP refresh failed with status $http_code"
            exit 1
          fi
      - name: Verify resolutions
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/verify-resolutions")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          echo "Verify Response: $body"
          echo "HTTP Status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "Verify resolutions failed with status $http_code"
            exit 1
          fi
      - name: News and sentiment
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/news-sentiment")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          echo "News/Sentiment Response: $body"
          echo "HTTP Status: $http_code"
          # Non-blocking: enrichment only. A news/Gemini hiccup must not fail the run.
          if [ "$http_code" != "200" ]; then
            echo "News/sentiment returned $http_code (non-fatal, continuing)"
          fi
